name: Deploy demo to GitHub Pages

# Publica el frontend (demo con datos mock) en GitHub Pages.
# El backend Express no corre en Pages: la app usa el fallback a mocks,
# entra sin login (bypass) y enruta por hash para soportar rutas profundas.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Permite una sola publicacion concurrente.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build demo
        working-directory: frontend
        env:
          VITE_BYPASS_AUTH: 'true'
          VITE_ALLOW_MOCK_FALLBACK: 'true'
          VITE_USE_HASH_ROUTER: 'true'
          VITE_APP_NAME: 'Truck Workshop (demo)'
        run: npm run build

      - name: SPA fallback (404 -> index)
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
